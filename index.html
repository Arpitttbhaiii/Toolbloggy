<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechBloggy — Dynamic Tool Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .active-cat { background: #000 !important; color: #fff !important; opacity: 1 !important; }
        .tool-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#fafafa] text-black">

    <nav class="sticky top-0 z-50 border-b border-black/5 bg-white/80 backdrop-blur-md">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="text-xl font-bold tracking-tighter uppercase">Tech<span class="font-light">Bloggy</span></div>
            <div class="flex items-center gap-6">
                <div class="relative hidden md:block">
                    <input type="text" id="toolSearch" onkeyup="filterTools()" placeholder="Search tools..." class="bg-gray-100 border-none rounded-full px-4 py-1.5 text-xs w-48 focus:w-64 transition-all outline-none">
                </div>
                <button class="bg-black text-white px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest">Login</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <header class="mb-12">
            <h1 class="text-5xl font-extrabold tracking-tighter uppercase mb-4">The Digital <br> Toolbox.</h1>
            <p class="text-xs opacity-40 uppercase tracking-widest">Filter by category or search below</p>
        </header>

        <div class="flex flex-wrap gap-3 mb-12" id="categoryContainer">
            <button onclick="filterByCategory('all')" class="cat-btn active-cat px-5 py-2 rounded-full border border-black/5 text-[10px] font-bold uppercase tracking-widest transition-all">All Tools</button>
            <button onclick="filterByCategory('Finance')" class="cat-btn px-5 py-2 rounded-full border border-black/5 text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition-all">Finance</button>
            <button onclick="filterByCategory('AI')" class="cat-btn px-5 py-2 rounded-full border border-black/5 text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition-all">AI Tools</button>
            <button onclick="filterByCategory('Dev')" class="cat-btn px-5 py-2 rounded-full border border-black/5 text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition-all">Developer</button>
            <button onclick="filterByCategory('Social')" class="cat-btn px-5 py-2 rounded-full border border-black/5 text-[10px] font-bold uppercase tracking-widest opacity-40 hover:opacity-100 transition-all">Social</button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="toolsGrid">
            </div>

        <section class="mt-24 pt-16 border-t border-black/5">
            <h2 class="text-xs font-black uppercase tracking-[0.4em] mb-12 opacity-30">Latest from Blog</h2>
            <div class="grid md:grid-cols-2 gap-12" id="blogContainer">
                </div>
        </section>
    </main>

    <script>
        // 1. Tools Data (Database substitute)
        const toolsData = [
            { name: "Bond Pricing Pro", desc: "Advanced YTM and valuation model.", cat: "Finance", link: "bond-calc.html", icon: "fa-vault" },
            { name: "SIP Wealth Hub", desc: "Compounding with step-up & inflation.", cat: "Finance", link: "sip-calc.html", icon: "fa-chart-line" },
            { name: "AI Content Writer", desc: "Generate SEO articles in seconds.", cat: "AI", link: "#", icon: "fa-robot" },
            { name: "JSON Formatter", desc: "Clean and validate your code.", cat: "Dev", link: "#", icon: "fa-code" },
            { name: "Meta Tag Gen", desc: "Boost your social media SEO.", cat: "Social", link: "#", icon: "fa-tags" },
            { name: "AI Image Studio", desc: "Upscale images with neural tech.", cat: "AI", link: "#", icon: "fa-image" }
        ];

        // 2. Render Tools Function
        function renderTools(data) {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = data.map(tool => `
                <a href="${tool.link}" class="tool-card group bg-white border border-black/5 p-6 rounded-2xl hover:shadow-xl flex flex-col justify-between h-48" data-category="${tool.cat}">
                    <div class="flex justify-between items-start">
                        <div class="w-10 h-10 bg-black text-white rounded-xl flex items-center justify-center group-hover:rotate-12 transition-transform">
                            <i class="fa-solid ${tool.icon}"></i>
                        </div>
                        <span class="text-[8px] font-bold uppercase opacity-30 tracking-widest">${tool.cat}</span>
                    </div>
                    <div>
                        <h3 class="text-xl font-bold uppercase tracking-tighter leading-none mb-2">${tool.name}</h3>
                        <p class="text-[10px] opacity-50 leading-tight">${tool.desc}</p>
                    </div>
                </a>
            `).join('');
        }

        // 3. Search Logic
        function filterTools() {
            const query = document.getElementById('toolSearch').value.toLowerCase();
            const filtered = toolsData.filter(t => t.name.toLowerCase().includes(query) || t.cat.toLowerCase().includes(query));
            renderTools(filtered);
        }

        // 4. Category Filter Logic
        function filterByCategory(category) {
            // Update UI (Buttons)
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active-cat'));
            event.target.classList.add('active-cat');

            if(category === 'all') {
                renderTools(toolsData);
            } else {
                const filtered = toolsData.filter(t => t.cat === category);
                renderTools(filtered);
            }
        }

        // Initial Load
        renderTools(toolsData);
    </script>
</body>
</html>
